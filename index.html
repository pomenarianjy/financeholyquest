<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Finance Holy Quest</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url('wallpaper.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            border: 4px solid #d4af37;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.7);
            overflow: hidden;
            background-color: #000;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-size: cover;
            background-position: center;
            z-index: 10;
        }

        #start-screen {
            background-image: url('start.png');
        }

        @keyframes pulse {
            0% { transform: scale(1); text-shadow: 0 0 10px #ff0; }
            50% { transform: scale(1.2); text-shadow: 0 0 20px #ff4500, 0 0 30px #ff0; }
            100% { transform: scale(1); text-shadow: 0 0 10px #ff0; }
        }

        #start-btn {
            font-size: 48px;
            font-weight: bold;
            color: #ffd700;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 30px;
            border: 2px solid #ffd700;
            border-radius: 10px;
            cursor: pointer;
            animation: pulse 1.5s infinite;
            margin-top: 150px;
        }

        #start-btn:hover {
            background: rgba(212, 175, 55, 0.3);
        }

        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 2px 2px #000;
            z-index: 5;
            pointer-events: none;
        }

        canvas {
            display: block;
            background-size: cover;
            background-position: center;
        }

        #congrats-screen {
            display: none;
            background-image: url('congrats.png');
            z-index: 20;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Start Screen -->
        <div id="start-screen" class="screen">
            <button id="start-btn" onclick="startGame()">Start!</button>
        </div>

        <!-- Main Game HUD -->
        <div id="hud" style="display: none;">
            <div id="level-indicator">Level 1: The Town</div>
            <div id="score-indicator">Score: 0</div>
        </div>

        <!-- Canvas -->
        <canvas id="gameCanvas" width="800" height="600" style="display: none;"></canvas>

        <!-- Congrats Screen -->
        <div id="congrats-screen" class="screen">
            <button id="start-btn" onclick="location.reload()" style="margin-top: 350px;">Play Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        let gameActive = false;
        let score = 0;
        let currentLevel = 1;

        const backgrounds = [
            'background1.png',
            'background2.png',
            'background3.png',
            'background4.png'
        ];
        
        const stageNames = [
            "Level 1: The Town",
            "Level 2: The Dragon",
            "Level 3: The Knight",
            "Level 4: The Princess"
        ];

        const stageAliens = [
            ['🐀', '🦇', '🕷️', '🐍'],
            ['🧟‍♂️', '🧌', '🐉', '🐲'],
            ['💀', '🌪️', '☄️', '⚡️'],
            ['🔮', '🧞‍♂️', '🧚‍♀️', '🧙‍♂️']
        ];

        const knightImg = new Image();
        knightImg.src = 'knight.png';

        const princessImg = new Image();
        princessImg.src = 'princess.png';

        let player = {
            x: 370,
            y: 530,
            width: 45,
            height: 45,
            speed: 6
        };

        let bullets = [];
        let chainMonsters = [];
        let targetPrincess = null;
        let keys = {};
        let chainOffset = 0;

        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if ((e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') && gameActive) {
                if (bullets.length === 0) {
                    bullets.push({
                        x: player.x + player.width / 2 - 3,
                        y: player.y,
                        width: 6,
                        height: 14,
                        speed: 8
                    });
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('hud').style.display = 'flex';
            canvas.style.display = 'block';
            gameActive = true;
            currentLevel = 1;
            loadLevel(currentLevel);
            gameLoop();
        }

        function loadLevel(level) {
            currentLevel = level;
            document.getElementById('level-indicator').innerText = stageNames[level - 1];
            canvas.style.backgroundImage = `url('${backgrounds[level - 1]}')`;
            
            player.x = 370;
            bullets = [];
            chainMonsters = [];
            chainOffset = 0;

            const alienEmojis = stageAliens[level - 1];
            
            // Generate rolling chain of connected emoji monsters
            let totalMonsters = 30;
            for (let i = 0; i < totalMonsters; i++) {
                chainMonsters.push({
                    index: i,
                    emoji: alienEmojis[i % alienEmojis.length],
                    alive: true,
                    width: 36,
                    height: 36
                });
            }

            // Target Princess spawns at top center once chain is cleared
            targetPrincess = {
                x: canvas.width / 2 - 25,
                y: 15,
                width: 50,
                height: 50,
                active: false
            };
        }

        function update() {
            if (!gameActive) return;

            // Knight horizontal controls
            if (keys['ArrowLeft'] || keys['KeyA']) {
                player.x -= player.speed;
            }
            if (keys['ArrowRight'] || keys['KeyD']) {
                player.x += player.speed;
            }

            if (player.x < 15) player.x = 15;
            if (player.x > canvas.width - player.width - 15) player.x = canvas.width - player.width - 15;

            // Bullets movement
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y -= bullets[i].speed;
                if (bullets[i].y < 0) {
                    bullets.splice(i, 1);
                }
            }

            // Rolling chain movement
            chainOffset += 0.8 + (currentLevel * 0.2);

            let activeCount = 0;
            chainMonsters.forEach((m, idx) => {
                if (m.alive) {
                    activeCount++;
                    let progressDist = (idx * 45) + chainOffset;
                    let row = Math.floor(progressDist / 700);
                    let distanceIntoRow = progressDist % 700;

                    let xPos, yPos;
                    if (row % 2 === 0) {
                        xPos = 80 + distanceIntoRow;
                    } else {
                        xPos = 720 - distanceIntoRow;
                    }
                    yPos = 50 + (row * 45) + (distanceIntoRow * 0.15);

                    m.x = xPos;
                    m.y = yPos;

                    // Chain hits the knight -> Level reset
                    if (m.y >= player.y - 15 && m.x > player.x - 20 && m.x < player.x + player.width + 20) {
                        loadLevel(currentLevel);
                        return;
                    }
                }
            });

            // When chain is fully cleared, activate Princess
            if (activeCount === 0) {
                targetPrincess.active = true;
            }

            // Bullet vs Chain Monster Collisions
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                for (let m of chainMonsters) {
                    if (m.alive && b.x < m.x + m.width && b.x + b.width > m.x &&
                        b.y < m.y + m.height && b.y + b.height > m.y) {
                        m.alive = false;
                        bullets.splice(i, 1);
                        score += 100;
                        document.getElementById('score-indicator').innerText = `Score: ${score}`;
                        break;
                    }
                }
            }

            // Knight touches Princess (Win Level Condition)
            if (targetPrincess.active) {
                if (player.x < targetPrincess.x + targetPrincess.width &&
                    player.x + player.width > targetPrincess.x &&
                    player.y < targetPrincess.y + targetPrincess.height &&
                    player.y + player.height > targetPrincess.y) {
                    advanceStage();
                }
            }
        }

        function advanceStage() {
            if (currentLevel < 4) {
                currentLevel++;
                loadLevel(currentLevel);
            } else {
                gameActive = false;
                canvas.style.display = 'none';
                document.getElementById('hud').style.display = 'none';
                document.getElementById('congrats-screen').style.display = 'flex';
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw chain links
            ctx.strokeStyle = '#d4af37';
            ctx.lineWidth = 3;
            ctx.beginPath();
            let first = true;
            for (let m of chainMonsters) {
                if (m.alive) {
                    if (first) {
                        ctx.moveTo(m.x + m.width / 2, m.y + m.height / 2);
                        first = false;
                    } else {
                        ctx.lineTo(m.x + m.width / 2, m.y + m.height / 2);
                    }
                }
            }
            ctx.stroke();

            // Draw Knight Player
            if (knightImg.complete && knightImg.naturalHeight !== 0) {
                ctx.drawImage(knightImg, player.x, player.y, player.width, player.height);
            } else {
                ctx.fillStyle = '#3498db';
                ctx.fillRect(player.x, player.y, player.width, player.height);
            }

            // Draw Bullets
            ctx.fillStyle = '#ffcc00';
            for (let b of bullets) {
                ctx.fillRect(b.x, b.y, b.width, b.height);
            }

            // Draw Rolling Chain Emoji Monsters
            ctx.font = '28px serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            for (let m of chainMonsters) {
                if (m.alive) {
                    ctx.fillText(m.emoji, m.x + m.width / 2, m.y + m.height / 2);
                }
            }

            // Draw Princess Goal (Knight must touch her to win level)
            if (targetPrincess.active) {
                if (princessImg.complete && princessImg.naturalHeight !== 0) {
                    ctx.drawImage(princessImg, targetPrincess.x, targetPrincess.y, targetPrincess.width, targetPrincess.height);
                } else {
                    ctx.fillStyle = '#ff69b4';
                    ctx.fillRect(targetPrincess.x, targetPrincess.y, targetPrincess.width, targetPrincess.height);
                }
            }
        }

        function gameLoop() {
            if (!gameActive) return;
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
