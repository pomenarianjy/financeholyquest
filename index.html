<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Finance Holy Quest</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url('wallpaper.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            border: 4px solid #0f0;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.5);
            overflow: hidden;
            background-color: #000;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-size: cover;
            background-position: center;
            z-index: 10;
        }

        #start-screen {
            background-image: url('start.png');
        }

        @keyframes pulse {
            0% { transform: scale(1); text-shadow: 0 0 10px #ff0; }
            50% { transform: scale(1.2); text-shadow: 0 0 20px #ff4500, 0 0 30px #ff0; }
            100% { transform: scale(1); text-shadow: 0 0 10px #ff0; }
        }

        #start-btn {
            font-size: 48px;
            font-weight: bold;
            color: #ffd700;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 30px;
            border: 2px solid #ffd700;
            border-radius: 10px;
            cursor: pointer;
            animation: pulse 1.5s infinite;
            margin-top: 150px;
        }

        #start-btn:hover {
            background: rgba(212, 175, 55, 0.3);
        }

        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
            color: #0f0;
            text-shadow: 2px 2px #000;
            z-index: 5;
            pointer-events: none;
        }

        canvas {
            display: block;
            background-size: cover;
            background-position: center;
        }

        #congrats-screen {
            display: none;
            background-image: url('congrats.png');
            z-index: 20;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Start Screen -->
        <div id="start-screen" class="screen">
            <button id="start-btn" onclick="startGame()">Start!</button>
        </div>

        <!-- Main Game HUD -->
        <div id="hud" style="display: none;">
            <div id="level-indicator">LEVEL 1: THE TOWN</div>
            <div id="score-indicator">SCORE: 000000</div>
        </div>

        <!-- Canvas -->
        <canvas id="gameCanvas" width="800" height="600" style="display: none;"></canvas>

        <!-- Congrats Screen -->
        <div id="congrats-screen" class="screen">
            <button id="start-btn" onclick="location.reload()" style="margin-top: 350px;">Play Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game Core State Variables
        let gameActive = false;
        let score = 0;
        let currentLevel = 1;

        // Assets Configuration
        const backgrounds = [
            'background1.png',
            'background2.png',
            'background3.png',
            'background4.png'
        ];
        
        const stageNames = [
            "LEVEL 1: THE TOWN",
            "LEVEL 2: THE DRAGON",
            "LEVEL 3: THE KNIGHT",
            "LEVEL 4: THE PRINCESS"
        ];

        // 1978 Space Invaders styled Alien Rows mapping to your custom emojis per stage
        const stageAliens = [
            ['🐀', '🦇', '🕷️', '🐍'],
            ['🧟‍♂️', '🧌', '🐉', '🐲'],
            ['💀', '🌪️', '☄️', '⚡️'],
            ['🔮', '🧞‍♂️', '🧚‍♀️', '🧙‍♂️']
        ];

        const knightImg = new Image();
        knightImg.src = 'knight.png';

        const princessImg = new Image();
        princessImg.src = 'princess.png';

        // 1978 Arcade Player (Cannon/Knight) Specification
        let player = {
            x: 370,
            y: 530,
            width: 44,
            height: 44,
            speed: 4
        };

        // Projectiles & Entities Arrays
        let bullets = [];
        let aliens = [];
        let targetPrincess = null;
        let keys = {};

        // 1978 Original Arcade Invader March Engine Variables
        let alienDirection = 1; // 1 moves right, -1 moves left
        let alienStepTimer = 0;
        let alienStepInterval = 45; // Base frame delay per grid step

        // Input Listeners Configuration
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            // Space Invaders strict hardware rule: only 1 player bullet allowed on screen concurrently
            if ((e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') && gameActive) {
                if (bullets.length === 0) {
                    bullets.push({
                        x: player.x + player.width / 2 - 2,
                        y: player.y,
                        width: 4,
                        height: 12,
                        speed: 7
                    });
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('hud').style.display = 'flex';
            canvas.style.display = 'block';
            gameActive = true;
            loadLevel(currentLevel);
            gameLoop();
        }

        function loadLevel(level) {
            currentLevel = level;
            document.getElementById('level-indicator').innerText = stageNames[level - 1];
            canvas.style.backgroundImage = `url('${backgrounds[level - 1]}')`;
            
            player.x = 370;
            bullets = [];
            aliens = [];
            alienDirection = 1;
            alienStepInterval = 45;

            // Build classic 1978 Space Invaders Formation Matrix (4 Rows x 8 Columns)
            const alienEmojis = stageAliens[level - 1];
            const rows = 4;
            const cols = 8;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    aliens.push({
                        x: 130 + c * 65,
                        y: 80 + r * 45,
                        width: 36,
                        height: 36,
                        emoji: alienEmojis[r],
                        alive: true
                    });
                }
            }

            // Target Princess setup (Spawns at top center once all invaders are eradicated)
            targetPrincess = {
                x: canvas.width / 2 - 22,
                y: 15,
                width: 45,
                height: 45,
                active: false
            };
        }

        function update() {
            if (!gameActive) return;

            // Player Arcade Movement (Left / Right)
            if (keys['ArrowLeft'] || keys['KeyA']) {
                player.x -= player.speed;
            }
            if (keys['ArrowRight'] || keys['KeyD']) {
                player.x += player.speed;
            }

            // Screen Borders Check
            if (player.x < 15) player.x = 15;
            if (player.x > canvas.width - player.width - 15) player.x = canvas.width - player.width - 15;

            // Player Bullet Upward Trajectory
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y -= bullets[i].speed;
                if (bullets[i].y < 0) {
                    bullets.splice(i, 1);
                }
            }

            // 1978 Original Arcade Invader March & Tempo Acceleration Mechanics
            alienStepTimer++;
            let activeAliens = aliens.filter(a => a.alive);
            
            // Authentic Space Invaders behavior: Speed increases progressively as total alien count drops
            let dynamicInterval = Math.max(6, alienStepInterval - (32 - activeAliens.length));

            if (alienStepTimer >= dynamicInterval && activeAliens.length > 0) {
                alienStepTimer = 0;
                let hitWall = false;

                // Check edge collisions for formation reversal
                for (let a of activeAliens) {
                    if ((alienDirection === 1 && a.x + a.width >= canvas.width - 30) ||
                        (alienDirection === -1 && a.x <= 30)) {
                        hitWall = true;
                        break;
                    }
                }

                if (hitWall) {
                    alienDirection *= -1; // Reverse horizontal trajectory
                    for (let a of aliens) {
                        a.y += 14; // Drop formation down by one tier
                        // Space Invaders arcade rule: Invasion breach condition triggers level reset
                        if (a.alive && a.y >= player.y - 10) {
                            loadLevel(currentLevel);
                            return;
                        }
                    }
                } else {
                    for (let a of aliens) {
                        a.x += alienDirection * 10; // Lateral step forward
                    }
                }
            }

            // Win condition trigger: When all stage aliens are destroyed, materialize the Princess goal
            if (activeAliens.length === 0) {
                targetPrincess.active = true;
            }

            // Bullet-to-Alien Hit Detection
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                for (let a of aliens) {
                    if (a.alive && b.x < a.x + a.width && b.x + b.width > a.x &&
                        b.y < a.y + a.height && b.y + b.height > a.y) {
                        a.alive = false;
                        bullets.splice(i, 1);
                        score += 100;
                        document.getElementById('score-indicator').innerText = `SCORE: ${String(score).padStart(6, '0')}`;
                        break;
                    }
                }
            }

            // Bullet-to-Princess Hit Detection (Advances Stage / Completes Quest)
            if (targetPrincess.active) {
                for (let i = bullets.length - 1; i >= 0; i--) {
                    let b = bullets[i];
                    if (b.x < targetPrincess.x + targetPrincess.width && b.x + b.width > targetPrincess.x &&
                        b.y < targetPrincess.y + targetPrincess.height && b.y + b.height > targetPrincess.y) {
                        
                        bullets.splice(i, 1);
                        advanceStage();
                    }
                }
            }
        }

        function advanceStage() {
            if (currentLevel < 4) {
                currentLevel++;
                loadLevel(currentLevel);
            } else {
                gameActive = false;
                canvas.style.display = 'none';
                document.getElementById('hud').style.display = 'none';
                document.getElementById('congrats-screen').style.display = 'flex';
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Player Knight Entity
            if (knightImg.complete && knightImg.naturalHeight !== 0) {
                ctx.drawImage(knightImg, player.x, player.y, player.width, player.height);
            } else {
                ctx.fillStyle = '#0f0';
                ctx.fillRect(player.x, player.y, player.width, player.height);
            }

            // Draw Arcade Laser Bullet
            ctx.fillStyle = '#ffff00';
            for (let b of bullets) {
                ctx.fillRect(b.x, b.y, b.width, b.height);
            }

            // Draw Invader Swarm Matrix using Emojis
            ctx.font = '28px serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            for (let a of aliens) {
                if (a.alive) {
                    ctx.fillText(a.emoji, a.x + a.width / 2, a.y + a.height / 2);
                }
            }

            // Draw Target Princess Goal Entity when active
            if (targetPrincess.active) {
                if (princessImg.complete && princessImg.naturalHeight !== 0) {
                    ctx.drawImage(princessImg, targetPrincess.x, targetPrincess.y, targetPrincess.width, targetPrincess.height);
                } else {
                    ctx.fillStyle = '#ff69b4';
                    ctx.fillRect(targetPrincess.x, targetPrincess.y, targetPrincess.width, targetPrincess.height);
                }
            }
        }

        function gameLoop() {
            if (!gameActive) return;
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
