<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Finance Holy Quest</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url('wallpaper.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            border: 4px solid #d4af37;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.7);
            overflow: hidden;
            background-color: #000;
            max-width: 100vw;
            max-height: 100vh;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-size: cover;
            background-position: center;
            z-index: 10;
        }

        #start-screen {
            background-image: url('start.png');
        }

        @keyframes pulse {
            0% { transform: scale(1); text-shadow: 0 0 10px #ff0; }
            50% { transform: scale(1.2); text-shadow: 0 0 20px #ff4500, 0 0 30px #ff0; }
            100% { transform: scale(1); text-shadow: 0 0 10px #ff0; }
        }

        #start-btn {
            font-size: 48px;
            font-weight: bold;
            color: #ffd700;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px 35px;
            border: 2px solid #ffd700;
            border-radius: 10px;
            cursor: pointer;
            animation: pulse 1.5s infinite;
            margin-top: 150px;
            -webkit-tap-highlight-color: transparent;
        }

        #start-btn:hover {
            background: rgba(212, 175, 55, 0.3);
        }

        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 2px 2px #000;
            z-index: 5;
            pointer-events: none;
        }

        canvas {
            display: block;
            background-size: cover;
            background-position: center;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            width: 100%;
            height: 100%;
        }

        #congrats-screen {
            display: none;
            background-image: url('congrats.png');
            z-index: 20;
            position: relative;
        }

        #mobile-controls {
            position: absolute;
            bottom: 15px;
            left: 0;
            width: 100%;
            display: none;
            justify-content: space-between;
            padding: 0 20px;
            box-sizing: border-box;
            z-index: 8;
            pointer-events: none;
        }

        .control-group {
            display: flex;
            gap: 15px;
            pointer-events: auto;
        }

        .control-btn {
            width: 65px;
            height: 65px;
            background: rgba(0, 0, 0, 0.5);
            border: 2px solid #ffd700;
            border-radius: 50%;
            color: #ffd700;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
            -webkit-tap-highlight-color: transparent;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
        }

        .control-btn:active {
            background: rgba(212, 175, 55, 0.4);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Start Screen -->
        <div id="start-screen" class="screen">
            <button id="start-btn" onclick="startGame()">Start!</button>
        </div>

        <!-- Main Game HUD -->
        <div id="hud" style="display: none;">
            <div id="level-indicator">Level 1: The Town</div>
            <div id="score-indicator">Score: 0</div>
        </div>

        <!-- Canvas -->
        <canvas id="gameCanvas" width="800" height="600" style="display: none;"></canvas>

        <!-- Mobile Touch Controls Overlay -->
        <div id="mobile-controls">
            <div class="control-group">
                <div class="control-btn" id="btn-left">◀</div>
                <div class="control-btn" id="btn-right">▶</div>
            </div>
            <div class="control-group">
                <div class="control-btn" id="btn-up">▲</div>
                <div class="control-btn" id="btn-down">▼</div>
            </div>
        </div>

        <!-- Congrats Screen -->
        <div id="congrats-screen" class="screen">
            <button id="start-btn" onclick="location.reload()" style="margin-top: 380px;">Play Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        ctx.imageSmoothingEnabled = false;

        let gameActive = false;
        let score = 0;
        let currentLevel = 1;

        const backgrounds = [
            'background1.png',
            'background2.png',
            'background3.png',
            'background4.png'
        ];
        
        const stageNames = [
            "Level 1: The Town",
            "Level 2: The Dragon",
            "Level 3: The Knight",
            "Level 4: The Princess"
        ];

        const stageAliens = [
            ['🐀', '🦇', '🕷️', '🐍'],
            ['🧟‍♂️', '🧌', '🐉', '🐲'],
            ['💀', '🌪️', '☄️', '⚡️'],
            ['🔮', '🧞‍♂️', '🧚‍♀️', '🧙‍♂️']
        ];

        const knightImg = new Image();
        knightImg.src = 'knight.png';

        const princessImg = new Image();
        princessImg.src = 'princess.png';

        let player = {
            x: 350,
            y: 490,
            width: 100,
            height: 100,
            speed: 8
        };

        let bullets = [];
        let chainMonsters = [];
        let targetPrincess = null;
        let keys = {};
        let chainOffset = 0;
        let autoBulletTimer = 0;
        let fireworks = [];
        let levelCompleteTimer = 0;

        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || window.innerWidth <= 768;

        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
        });

        window.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        function setupTouchControls() {
            const bindTouch = (id, code) => {
                const el = document.getElementById(id);
                if (!el) return;
                el.addEventListener('touchstart', (e) => { e.preventDefault(); keys[code] = true; }, {passive: false});
                el.addEventListener('touchend', (e) => { e.preventDefault(); keys[code] = false; }, {passive: false});
                el.addEventListener('mousedown', (e) => { e.preventDefault(); keys[code] = true; });
                el.addEventListener('mouseup', (e) => { e.preventDefault(); keys[code] = false; });
            };

            bindTouch('btn-left', 'ArrowLeft');
            bindTouch('btn-right', 'ArrowRight');
            bindTouch('btn-up', 'ArrowUp');
            bindTouch('btn-down', 'ArrowDown');

            canvas.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (!gameActive) return;
                const rect = canvas.getBoundingClientRect();
                const touchX = e.touches[0].clientX - rect.left;
                const touchY = e.touches[0].clientY - rect.top;
                
                const scaleX = canvas.width / rect.width;
                const scaleY = canvas.height / rect.height;

                player.x = (touchX * scaleX) - (player.width / 2);
                player.y = (touchY * scaleY) - (player.height / 2);

                if (player.x < 10) player.x = 10;
                if (player.x > canvas.width - player.width - 10) player.x = canvas.width - player.width - 10;
                if (player.y < 10) player.y = 10;
                if (player.y > canvas.height - player.height - 10) player.y = canvas.height - player.height - 10;
            }, {passive: false});
        }

        setupTouchControls();

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('hud').style.display = 'flex';
            canvas.style.display = 'block';
            
            if (isMobile) {
                document.getElementById('mobile-controls').style.display = 'flex';
            }

            gameActive = true;
            currentLevel = 1;
            loadLevel(currentLevel);
            gameLoop();
        }

        function loadLevel(level) {
            currentLevel = level;
            document.getElementById('level-indicator').innerText = stageNames[level - 1];
            canvas.style.backgroundImage = `url('${backgrounds[level - 1]}')`;
            
            player.x = 350;
            player.y = 490;
            bullets = [];
            chainMonsters = [];
            chainOffset = 0;
            autoBulletTimer = 0;
            fireworks = [];
            levelCompleteTimer = 0;

            const alienEmojis = stageAliens[level - 1];
            
            let totalMonsters = (level === 1) ? 12 : (25 + (level * 5));
            for (let i = 0; i < totalMonsters; i++) {
                chainMonsters.push({
                    index: i,
                    emoji: alienEmojis[i % alienEmojis.length],
                    alive: true,
                    width: 34,
                    height: 34
                });
            }

            targetPrincess = {
                x: canvas.width / 2 - 50,
                y: 10,
                width: 100,
                height: 100,
                active: false
            };
        }

        function triggerFireworks() {
            const flowerEmojis = ['🌸', '🌺', '🌼', '🌻', '🌷', '💮'];
            let originX = targetPrincess.x + targetPrincess.width / 2;
            let originY = targetPrincess.y + targetPrincess.height / 2;

            for (let i = 0; i < 35; i++) {
                let angle = Math.random() * Math.PI * 2;
                let speed = 2 + Math.random() * 5;
                fireworks.push({
                    x: originX,
                    y: originY,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    emoji: flowerEmojis[Math.floor(Math.random() * flowerEmojis.length)],
                    alpha: 1.0,
                    life: 60 + Math.random() * 30
                });
            }
        }

        function update() {
            if (!gameActive) return;

            if (levelCompleteTimer > 0) {
                levelCompleteTimer--;
                fireworks.forEach(f => {
                    f.x += f.vx;
                    f.y += f.vy;
                    f.alpha -= 0.015;
                });
                if (levelCompleteTimer === 0) {
                    if (currentLevel < 4) {
                        currentLevel++;
                        loadLevel(currentLevel);
                    } else {
                        gameActive = false;
                        canvas.style.display = 'none';
                        document.getElementById('hud').style.display = 'none';
                        document.getElementById('mobile-controls').style.display = 'none';
                        document.getElementById('congrats-screen').style.display = 'flex';
                    }
                }
                return;
            }

            let activeCount = chainMonsters.filter(m => m.alive).length;

            // Firing bullets faster and more consecutively (decreased interval threshold and higher velocity)
            autoBulletTimer++;
            if (autoBulletTimer >= 4) {
                bullets.push({
                    x: player.x + player.width / 2 - 3,
                    y: player.y,
                    width: 6,
                    height: 16,
                    speed: 18
                });
                autoBulletTimer = 0;
            }

            if (keys['ArrowLeft'] || keys['KeyA']) player.x -= player.speed;
            if (keys['ArrowRight'] || keys['KeyD']) player.x += player.speed;
            if (keys['ArrowUp'] || keys['KeyW']) player.y -= player.speed;
            if (keys['ArrowDown'] || keys['KeyS']) player.y += player.speed;

            if (player.x < 10) player.x = 10;
            if (player.x > canvas.width - player.width - 10) player.x = canvas.width - player.width - 10;
            if (player.y < 10) player.y = 10;
            if (player.y > canvas.height - player.height - 10) player.y = canvas.height - player.height - 10;

            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y -= bullets[i].speed;
                if (bullets[i].y < 0) {
                    bullets.splice(i, 1);
                }
            }

            if (activeCount > 0) {
                chainOffset += 2.8 + (currentLevel * 0.5);

                chainMonsters.forEach((m, idx) => {
                    if (m.alive) {
                        let progressDist = (idx * 35) + chainOffset;
                        let row = Math.floor(progressDist / 700);
                        let distanceIntoRow = progressDist % 700;

                        let xPos, yPos;
                        if (row % 2 === 0) {
                            xPos = 50 + distanceIntoRow + Math.sin(progressDist * 0.05) * 30;
                        } else {
                            xPos = 750 - distanceIntoRow - Math.cos(progressDist * 0.05) * 30;
                        }
                        yPos = 30 + (row * 35) + (distanceIntoRow * 0.15);

                        m.x = xPos;
                        m.y = yPos;

                        let hitBoxPadding = 15;
                        if (player.x + hitBoxPadding < m.x + m.width &&
                            player.x + player.width - hitBoxPadding > m.x &&
                            player.y + hitBoxPadding < m.y + m.height &&
                            player.y + player.height - hitBoxPadding > m.y) {
                            loadLevel(currentLevel);
                            return;
                        }
                    }
                });
            }

            if (activeCount === 0 && !targetPrincess.active) {
                targetPrincess.active = true;
            }

            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                for (let m of chainMonsters) {
                    if (m.alive && b.x < m.x + m.width && b.x + b.width > m.x &&
                        b.y < m.y + m.height && b.y + b.height > m.y) {
                        m.alive = false;
                        bullets.splice(i, 1);
                        score += 100;
                        document.getElementById('score-indicator').innerText = `Score: ${score}`;
                        break;
                    }
                }
            }

            if (targetPrincess.active && levelCompleteTimer === 0) {
                if (player.x < targetPrincess.x + targetPrincess.width &&
                    player.x + player.width > targetPrincess.x &&
                    player.y < targetPrincess.y + targetPrincess.height &&
                    player.y + player.height > targetPrincess.y) {
                    triggerFireworks();
                    levelCompleteTimer = 70;
                }
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (fireworks.length > 0) {
                ctx.save();
                ctx.font = '24px serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                fireworks.forEach(f => {
                    ctx.globalAlpha = Math.max(0, f.alpha);
                    ctx.fillText(f.emoji, f.x, f.y);
                });
                ctx.restore();
            }

            if (targetPrincess.active) {
                ctx.save();
                ctx.shadowColor = '#ffffff';
                ctx.shadowBlur = 30;
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 4;
                ctx.strokeRect(targetPrincess.x - 3, targetPrincess.y - 3, targetPrincess.width + 6, targetPrincess.height + 6);

                if (princessImg.complete && princessImg.naturalHeight !== 0) {
                    ctx.drawImage(princessImg, targetPrincess.x, targetPrincess.y, targetPrincess.width, targetPrincess.height);
                } else {
                    ctx.fillStyle = '#ff69b4';
                    ctx.fillRect(targetPrincess.x, targetPrincess.y, targetPrincess.width, targetPrincess.height);
                }
                ctx.restore();
            }

            ctx.save();
            ctx.shadowColor = '#ffffff';
            ctx.shadowBlur = 25;
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 4;
            ctx.strokeRect(player.x - 3, player.y - 3, player.width + 6, player.height + 6);

            if (knightImg.complete && knightImg.naturalHeight !== 0) {
                ctx.drawImage(knightImg, player.x, player.y, player.width, player.height);
            } else {
                ctx.fillStyle = '#3498db';
                ctx.fillRect(player.x, player.y, player.width, player.height);
            }
            ctx.restore();

            ctx.fillStyle = '#00ffff';
            for (let b of bullets) {
                ctx.fillRect(b.x, b.y, b.width, b.height);
            }

            ctx.font = '28px serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            for (let m of chainMonsters) {
                if (m.alive) {
                    ctx.fillText(m.emoji, m.x + m.width / 2, m.y + m.height / 2);
                }
            }
        }

        function gameLoop() {
            if (!gameActive && levelCompleteTimer === 0) return;
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
