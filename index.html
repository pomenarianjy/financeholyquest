<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Finance Holy Quest</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url('wallpaper.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
        }

        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            border: 4px solid #d4af37;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.7);
            overflow: hidden;
            background-color: #111;
        }

        /* Screen overlays */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-size: cover;
            background-position: center;
            z-index: 10;
        }

        #start-screen {
            background-image: url('start.png');
        }

        /* Animation for Start button */
        @keyframes pulse {
            0% { transform: scale(1); text-shadow: 0 0 10px #ff0; }
            50% { transform: scale(1.2); text-shadow: 0 0 20px #ff4500, 0 0 30px #ff0; }
            100% { transform: scale(1); text-shadow: 0 0 10px #ff0; }
        }

        #start-btn {
            font-size: 48px;
            font-weight: bold;
            color: #ffd700;
            background: rgba(0, 0, 0, 0.6);
            padding: 10px 30px;
            border: 2px solid #ffd700;
            border-radius: 10px;
            cursor: pointer;
            animation: pulse 1.5s infinite;
            margin-top: 150px;
        }

        #start-btn:hover {
            background: rgba(212, 175, 55, 0.3);
        }

        /* HUD */
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px #000;
            z-index: 5;
            pointer-events: none;
        }

        /* Canvas game area */
        canvas {
            display: block;
            background-size: cover;
            background-position: center;
        }

        /* Congrats Screen */
        #congrats-screen {
            display: none;
            background-image: url('congrats.png');
            z-index: 20;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Start Screen -->
        <div id="start-screen" class="screen">
            <button id="start-btn" onclick="startGame()">Start!</button>
        </div>

        <!-- Main Game HUD -->
        <div id="hud" style="display: none;">
            <div id="level-indicator">Level 1: The Town</div>
            <div id="score-indicator">Score: 0</div>
        </div>

        <!-- Canvas -->
        <canvas id="gameCanvas" width="800" height="600" style="display: none;"></canvas>

        <!-- Congrats Overlay -->
        <div id="congrats-screen" class="screen">
            <h1 style="font-size: 48px; text-shadow: 3px 3px #000; background: rgba(0,0,0,0.7); padding: 20px; border-radius: 10px; border: 3px solid gold;">Victory! Kingdom Saved!</h1>
            <button id="start-btn" onclick="location.reload()" style="margin-top: 20px;">Play Again</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game States
        let gameActive = false;
        let score = 0;
        let currentLevel = 1;

        // Assets
        const backgrounds = [
            'background1.png',
            'background2.png',
            'background3.png',
            'background4.png'
        ];
        
        const stageNames = [
            "Level 1: The Town",
            "Level 2: The Dragon",
            "Level 3: The Knight",
            "Level 4: The Princess"
        ];

        const stageAliens = [
            ['рЯРА', 'рЯ¶З', 'рЯХЈпЄП', 'рЯРН'],
            ['рЯІЯвАНвЩВпЄП', 'рЯІМ', 'рЯРЙ', 'рЯР≤'],
            ['рЯТА', 'рЯМ™пЄП', 'вШДпЄП', 'вЪ°пЄП'],
            ['рЯФЃ', 'рЯІЮвАНвЩВпЄП', 'рЯІЪвАНвЩАпЄП', 'рЯІЩвАНвЩВпЄП']
        ];

        const knightImg = new Image();
        knightImg.src = 'knight.png';

        const princessImg = new Image();
        princessImg.src = 'princess.png';

        // Player (Knight)
        let player = {
            x: 370,
            y: 520,
            width: 50,
            height: 50,
            speed: 6,
            dx: 0
        };

        // Projectiles & Entities
        let bullets = [];
        let aliens = [];
        let targetPrincess = null;
        let keys = {};

        // Event Listeners for Controls
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if (e.code === 'Space' && gameActive) {
                bullets.push({
                    x: player.x + player.width / 2 - 3,
                    y: player.y,
                    width: 6,
                    height: 12,
                    speed: 8
                });
            }
        });

        window.addEventListener('keyup', (e) => {
            keys[e.code] = false;
        });

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('hud').style.display = 'flex';
            canvas.style.display = 'block';
            gameActive = true;
            loadLevel(currentLevel);
            gameLoop();
        }

        function loadLevel(level) {
            currentLevel = level;
            document.getElementById('level-indicator').innerText = stageNames[level - 1];
            canvas.style.backgroundImage = `url('${backgrounds[level - 1]}')`;
            
            // Reset player position
            player.x = 370;
            bullets = [];
            aliens = [];

            // Spawn Alien Grid
            const alienEmojis = stageAliens[level - 1];
            const rows = 4;
            const cols = 8;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    aliens.push({
                        x: 80 + c * 75,
                        y: 60 + r * 50,
                        width: 40,
                        height: 40,
                        emoji: alienEmojis[r],
                        alive: true
                    });
                }
            }

            // Target Princess setup for the level win condition
            targetPrincess = {
                x: canvas.width / 2 - 25,
                y: 10,
                width: 50,
                height: 50,
                active: false // becomes active once all aliens are cleared
            };
        }

        function update() {
            if (!gameActive) return;

            // Player movement
            if (keys['ArrowLeft'] || keys['KeyA']) {
                player.x -= player.speed;
            }
            if (keys['ArrowRight'] || keys['KeyD']) {
                player.x += player.speed;
            }

            // Boundaries
            if (player.x < 0) player.x = 0;
            if (player.x > canvas.width - player.width) player.x = canvas.width - player.width;

            // Bullets movement
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y -= bullets[i].speed;
                if (bullets[i].y < 0) {
                    bullets.splice(i, 1);
                }
            }

            // Check if all aliens are defeated to spawn/activate the Princess goal
            let activeAliensCount = aliens.filter(a => a.alive).length;
            if (activeAliensCount === 0) {
                targetPrincess.active = true;
            }

            // Bullet-Alien Collision Detection
            for (let i = bullets.length - 1; i >= 0; i--) {
                let b = bullets[i];
                for (let a of aliens) {
                    if (a.alive && b.x < a.x + a.width && b.x + b.width > a.x &&
                        b.y < a.y + a.height && b.y + b.height > a.y) {
                        a.alive = false;
                        bullets.splice(i, 1);
                        score += 100;
                        document.getElementById('score-indicator').innerText = `Score: ${score}`;
                        break;
                    }
                }
            }

            // Bullet-Princess Collision Detection (Win Level Condition)
            if (targetPrincess.active) {
                for (let i = bullets.length - 1; i >= 0; i--) {
                    let b = bullets[i];
                    if (b.x < targetPrincess.x + targetPrincess.width && b.x + b.width > targetPrincess.x &&
                        b.y < targetPrincess.y + targetPrincess.height && b.y + b.height > targetPrincess.y) {
                        
                        // Level cleared!
                        bullets.splice(i, 1);
                        advanceLevel();
                    }
                }
            }
        }

        function advanceLevel() {
            if (currentLevel < 4) {
                currentLevel++;
                loadLevel(currentLevel);
            } else {
                // Game Won completely
                gameActive = false;
                canvas.style.display = 'none';
                document.getElementById('hud').style.display = 'none';
                document.getElementById('congrats-screen').style.display = 'flex';
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Player (Knight)
            if (knightImg.complete && knightImg.naturalHeight !== 0) {
                ctx.drawImage(knightImg, player.x, player.y, player.width, player.height);
            } else {
                ctx.fillStyle = '#3498db';
                ctx.fillRect(player.x, player.y, player.width, player.height);
            }

            // Draw Bullets
            ctx.fillStyle = '#ffcc00';
            for (let b of bullets) {
                ctx.fillRect(b.x, b.y, b.width, b.height);
            }

            // Draw Aliens
            ctx.font = '32px serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            for (let a of aliens) {
                if (a.alive) {
                    ctx.fillText(a.emoji, a.x + a.width / 2, a.y + a.height / 2);
                }
            }

            // Draw Princess Goal if active
            if (targetPrincess.active) {
                if (princessImg.complete && princessImg.naturalHeight !== 0) {
                    ctx.drawImage(princessImg, targetPrincess.x, targetPrincess.y, targetPrincess.width, targetPrincess.height);
                } else {
                    ctx.fillStyle = '#ff69b4';
                    ctx.fillRect(targetPrincess.x, targetPrincess.y, targetPrincess.width, targetPrincess.height);
                }
            }
        }

        function gameLoop() {
            if (!gameActive) return;
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
    </script>
</body>
</html>
